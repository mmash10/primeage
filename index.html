<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#0B0D12">
    <title>PrimeAge v3</title>
    <style>
        :root {
            --bg: #0B0D12;
            --card: #151922;
            --card2: #1B2130;
            --accent: #4F46E5;
            --green: #22C55E;
            --text: #F8FAFC;
            --muted: #94A3B8
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial;
            padding: 16px
        }

        .app {
            max-width: 520px;
            margin: auto
        }

        .logo {
    width: 120px;
    height: 120px;
    margin: 0 auto 12px;
}

.logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

        .header {
            text-align: center
        }

        .ringwrap,
        .card,
        .section,
        .report {
            background: var(--card);
            border-radius: 22px;
            padding: 16px;
            margin-top: 12px
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .value {
            font-size: 28px;
            font-weight: bold
        }

        input {
    width: 100%;
    box-sizing: border-box;
    padding: 10px 14px;
    margin: 6px 0;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 12px;
    color: white;
            
}
        input::placeholder {
    color: #6B7280;
}

input:focus {
    outline: none;
    border-color: #4F46E5;
    box-shadow: 0 0 0 2px rgba(79,70,229,0.15);
}
        label{
    display:block;
   margin:14px 0 8px;
font-size:13px;
color:#94A3B8;
font-weight:500;
letter-spacing:0.3px;
}

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: var(--accent);
            color: white;
            font-weight: bold;
            cursor: pointer
        }

        button:hover {
            filter: brightness(1.1)
        }

        .ring {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: conic-gradient(#4F46E5 250deg, #2b3244 0)
        }

        .inner {
            width: 128px;
            height: 128px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="header">
<div class="logo">
    <img src="apple-touch-icon.png" alt="PrimeAge Logo">
</div>            <h1>PrimeAge</h1>
            <div>Health Intelligence</div>
        </div>
        <div class="ringwrap">
            <div class="ring" id="ring">
                <div class="inner">
                    <div id="health" class="value">0</div>
                    <div>Health Score</div>
                </div>
            </div>
        </div>
        <div class="cards">
            <div class="card">Biological Age<div class="value" id="bio">0</div>
            </div>
            <div class="card">Fitness Age<div class="value" id="fit">0</div>
            </div>
            <div class="card">Recovery<div class="value" id="recovery">0</div>
            </div>
            <div class="card">BMI<div class="value" id="bmi">0</div>
            </div>
        </div>
        <div class="section">
    <h3>👤 Personal</h3>

    <label>Age</label>
    <input id="age">

    <label>Weight</label>
    <input id="weight">

    <label>Height</label>
    <input id="height">
</div>
        <div class="section">
    <h3>⚡ Performance</h3>

    <label>VO2 Max</label>
    <input id="vo2">

    <label>HRV</label>
    <input id="hrv">

    <label>Resting HR</label>
    <input id="rhr">
</div>
        <div class="section">
    <h3>🌙 Lifestyle</h3>

    <label>Sleep Score</label>
    <input id="sleep">

    <label>Daily Steps</label>
    <input id="steps">

    <label>Training Sessions</label>
    <input id="train">
</div>
        </div><button onclick="calculate()">Analyze Health</button>
        <div class="report" id="report"></div>
    </div>
    <script>const ids = ["age", "weight", "height", "vo2", "hrv", "rhr", "sleep", "steps", "train"];  function c(v, min, max) { return Math.max(min, Math.min(max, v)) } function calculate() { let age = +document.getElementById("age").value || 0; let weight = +document.getElementById("weight").value || 0; let height = +document.getElementById("height").value || 0; let vo2 = +document.getElementById("vo2").value || 0; let hrv = +document.getElementById("hrv").value || 0; let rhr = +document.getElementById("rhr").value || 0; let sleep = +document.getElementById("sleep").value || 0; let steps = +document.getElementById("steps").value || 0; let train = +document.getElementById("train").value || 0; ids.forEach(i => localStorage.setItem(i, document.getElementById(i).value)); let bmi = height ? weight / ((height / 100) ** 2) : 0; let health = c(Math.round(50 + (vo2 - 35) * 1.8 + (hrv - 40) * 0.6 + (70 - rhr) * 0.8 + (sleep - 75) * 0.8 + (steps - 7000) / 300), 0, 100); let recovery = c(Math.round((sleep * 0.55) + (Math.min(hrv, 100) * 0.45)), 0, 100); let fit = Math.round(c(age - (vo2 - 35) * 0.7 - (hrv - 40) * 0.10 - (70 - rhr) * 0.25 - (train - 3) * 0.6, 16, 90)); let bio = Math.round(c(age - (vo2 - 35) * 0.35 - (hrv - 40) * 0.08 - (sleep - 75) * 0.12, 16, 95)); document.getElementById("health").textContent = health; document.getElementById("fit").textContent = fit; document.getElementById("bio").textContent = bio; document.getElementById("recovery").textContent = recovery + "%"; document.getElementById("bmi").textContent = bmi.toFixed(1); let deg = Math.max(10, health * 3.6); document.getElementById("ring").style.background = `conic-gradient(#4F46E5 0deg,#22C55E ${deg}deg,#2b3244 ${deg}deg)`; document.getElementById("report").innerHTML = "Trend: " + (health >= 85 ? "↗ Improving" : health >= 70 ? "→ Stable" : "↘ Needs Attention") } calculate();</script>
</body>

</html>
